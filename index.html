<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kermes Menü</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

/* Dil butonları */
.lang-btn {
    width: 100%;
    padding: 16px;
    margin: 8px 0;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #ff7a00;
    color: white;
}

/* Kategori */
.category {
    font-size: 22px;
    font-weight: bold;
    margin-top: 30px;
    margin-bottom: 10px;
    padding-left: 10px;
    border-left: 5px solid #ff7a00;
}

/* Kart */
.card {
    background: white;
    border-radius: 14px;
    margin: 10px 0;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
}

.card img {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
}

.title {
    font-weight: 600;
}

.price {
    margin-left: auto;
    font-weight: bold;
    background: #ff7a00;
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
}

.hidden {
    display: none;
}

.top-text {
    text-align:center;
    color:#777;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container" id="lang">
<h2 style="text-align:center;">🌍 Dil seçiniz</h2>

<button class="lang-btn" onclick="loadMenu('tr')">🇹🇷 Türkçe</button>
<button class="lang-btn" onclick="loadMenu('fr')">🇫🇷 Français</button>
<button class="lang-btn" onclick="loadMenu('nl')">🇧🇪 Nederlands</button>
</div>

<div class="container hidden" id="menu"></div>

<script>

// ✅ SENİN SHEET LINKİN (DEĞİŞTİRME)
const sheetURL = "https://opensheet.elk.sh/1ctqry-ahkGcmaAxr7xLueborI5cGTQUBlvEZcAJhbCc/Sayfa1";

function loadMenu(lang) {
    document.getElementById('lang').style.display = 'none';
    const menuDiv = document.getElementById('menu');
    menuDiv.classList.remove("hidden");

    fetch(sheetURL)
    .then(res => res.json())
    .then(data => {

        let html = `<div class="top-text">📱 Menü görüntüleme amaçlıdır</div>`;
        let currentCategory = "";

        data.forEach(item => {

            let kategori = item["kategori_" + lang];
            let urun = item["urun_" + lang];

            if (!kategori || !urun) return;

            if (kategori !== currentCategory) {
                html += `<div class="category">${kategori}</div>`;
                currentCategory = kategori;
            }

            html += `
            <div class="card">
                <img src="${item.resim || 'https://via.placeholder.com/90'}">
                <div class="title">${urun}</div>
                <div class="price">${item.fiyat || ''}</div>
            </div>
            `;
        });

        menuDiv.innerHTML = html;

    })
    .catch(err => {
        menuDiv.innerHTML = "Menü yüklenemedi";
        console.error(err);
    });
}

</script>

</body>
</html>
